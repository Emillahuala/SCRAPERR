name: Scrape — cruceros.cl

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['.github/workflows/scrape-cruceros.yml']
  # schedule:
  #   - cron: '0 */6 * * *'   # activo desde Fase 3

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: services/scraper
        run: uv sync

      - name: Run scraper
        working-directory: services/scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python -m scraper.cli run --site cruceros_cl

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: services/scraper/*.log
          retention-days: 7
